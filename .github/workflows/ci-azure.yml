name: CI - Azure Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Login to Azure (OIDC attempt)
        id: oidc_login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: OIDC
          audience: api://AzureADTokenExchange
          enable-AzPSSession: false
        continue-on-error: true

      - name: Login to Azure (Service Principal fallback)
        if: ${{ failure() }}
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Login to Azure (OIDC attempt)
        id: oidc_login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: OIDC
          audience: api://AzureADTokenExchange
          enable-AzPSSession: false
        continue-on-error: true

      - name: Login to Azure (Service Principal fallback)
        if: ${{ failure() }}
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: false

      - name: Install dependencies
        run: npm ci

      - name: Run smoke (local)
        run: npm run smoke:local

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: artifacts/ttam_local_smoke/**

# Notes:
# - Do NOT commit any credential files to the repository.
# - Create a repository secret named AZURE_CREDENTIALS containing the
#   JSON output from `az ad sp create-for-rbac ... --sdk-auth` before
#   running this workflow.
