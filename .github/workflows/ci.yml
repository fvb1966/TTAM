name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (Node 18)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build renderer
        run: npm run build --if-present

      - name: Build main (esbuild)
        run: npm run build:main --if-present

  build:
    name: Build Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (if applicable)
        run: npx prisma generate
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present -- --run

      - name: Build renderer
        run: npm run build --if-present

      - name: Build main
        run: npm run build:main --if-present

      - name: Create distribution zip
        run: |
          echo "Creating dist archive"
          files=""
          if [ -d dist ]; then files="$files dist"; fi
          if [ -d renderer/dist ]; then files="$files renderer/dist"; fi
          if [ -d build/renderer ]; then files="$files build/renderer"; fi
          if [ -d dist/main ]; then files="$files dist/main"; fi
          if [ -z "$files" ]; then echo "No build outputs found"; else zip -r "dist-${{ matrix.node-version }}-${{ github.run_id }}.zip" $files; fi
        shell: bash

      - name: Upload distribution zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip-${{ matrix.node-version }}-${{ github.run_id }}
          path: dist-${{ matrix.node-version }}-${{ github.run_id }}.zip
          if-no-files-found: warn

      - name: Upload renderer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist-${{ matrix.node-version }}-${{ github.run_id }}
          path: |
            dist
            renderer/dist
            build/renderer
          if-no-files-found: warn

      - name: Upload main artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-build-${{ matrix.node-version }}-${{ github.run_id }}
          path: |
            dist/main
            build/main
            main/dist
          if-no-files-found: warn
