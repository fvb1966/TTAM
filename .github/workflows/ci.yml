name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (if applicable)
        run: npx prisma generate
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present -- --run

      - name: Build renderer
        run: npm run build:renderer --if-present

      - name: Build main
        run: npm run build:main --if-present

      - name: Upload renderer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist-${{ matrix.node-version }}-${{ github.run_id }}
          path: |
            dist
            renderer/dist
            build/renderer
          if-no-files-found: warn

      - name: Upload main artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-build-${{ matrix.node-version }}-${{ github.run_id }}
          path: |
            dist/main
            build/main
            main/dist
          if-no-files-found: warn
