name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (if applicable)
        run: npx prisma generate
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present -- --run

      - name: Build renderer
        run: npm run build:renderer --if-present

      - name: Build main
        run: npm run build:main --if-present
