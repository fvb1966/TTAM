name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (if applicable)
        run: npx prisma generate || true
        continue-on-error: true

      - name: Build renderer
        run: npm run build:renderer --if-present

      - name: Build main
        run: npm run build:main --if-present

      - name: Package with electron-builder
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.target }} --x64 --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-${{ matrix.target }}-${{ github.run_id }}
          path: |
            dist
            out
            release
          if-no-files-found: warn

      - name: Generate changelog (git commits)
        if: matrix.os == 'ubuntu-latest'
        id: changelog
        run: |
          set -euo pipefail
          git fetch --tags || true
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%an)" > changelog.txt || true
          else
            git log --pretty=format:"- %s (%an)" > changelog.txt || true
          fi
          if [ ! -s changelog.txt ]; then
            echo "No notable changes." > changelog.txt
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload packaged artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            out/**
            dist/**
            release/**
          body: ${{ steps.changelog.outputs.body }}
